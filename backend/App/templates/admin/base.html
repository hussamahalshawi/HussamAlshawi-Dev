<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ admin_view.name }} | HussamDev Admin{% endblock %}</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN SYSTEM TOKENS --- */
        :root {
            --primary-color: #2563eb;                           /* Brand primary blue */
            --sidebar-bg: #1e293b;                              /* Dark slate for depth */
            --main-bg: #f8fafc;                                 /* Clean light background */
        }

        body {
            background-color: var(--main-bg);
            font-family: 'Inter', sans-serif;                   /* Global professional font */
        }

        /* --- NAVIGATION STYLING --- */
        .navbar-custom {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.75rem 1.5rem;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #0f172a !important;
        }

        .nav-link {
            color: #475569 !important;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: var(--primary-color) !important;             /* Hover feedback */
        }

        /* Styling for the soft blue button */
        .btn-soft-primary {
            background-color: #eff6ff;
            color: var(--primary-color) !important;
            border: none;
        }

        .btn-soft-primary:hover {
            background-color: var(--primary-color);
            color: #ffffff !important;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top shadow-sm">
    <a class="navbar-brand" href="/admin">
        <i class="fas fa-cube text-primary mr-2"></i> HussamDev <span class="badge badge-soft-primary ml-1">v3.0</span>
    </a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#adminNavbar"
            aria-controls="adminNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="adminNavbar">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link" href="/admin">
                    <i class="fas fa-home mr-1"></i> Home
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'profile' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('profile.index_view') }}">
                    <i class="fas fa-user-circle mr-1"></i> Profile
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'education' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('education.index_view') }}">
                    <i class="fas fa-graduation-cap mr-1"></i> Education
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'achievement' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('achievement.index_view') }}">
                    <i class="fas fa-trophy mr-1"></i> Achievements
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'category' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('category.index_view') }}">
                    <i class="fas fa-tags mr-1"></i> Categories
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'course' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('course.index_view') }}">
                    <i class="fas fa-certificate mr-1"></i> Courses
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'experience' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('experience.index_view') }}">
                    <i class="fas fa-briefcase mr-1"></i> Experience
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'skilltype' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('skilltype.index_view') }}">
                    <i class="fas fa-layer-group mr-1"></i> Skill Types
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'skill' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('skill.index_view') }}">
                    <i class="fas fa-microchip mr-1"></i> Skills
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'selfstudy' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('selfstudy.index_view') }}">
                    <i class="fas fa-book-reader mr-1"></i> Self Study
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'project' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('project.index_view') }}">
                    <i class="fas fa-project-diagram mr-1"></i> Projects
                </a>
            </li>


            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'mediavault' %}active text-primary font-weight-bold{% endif %}"
                   href="{{ url_for('mediavault.index_view') }}">
                    <i class="fas fa-hdd mr-1"></i> Media Vault
                </a>
            </li>

            <li class="nav-item ml-lg-2">
                <a class="nav-link btn btn-soft-primary rounded-pill px-3" href="/api" target="_blank">
                    <i class="fas fa-external-link-alt mr-1"></i> View Site
                </a>
            </li>
        </ul>
    </div>
</nav>

<main class="py-4">
    {% block body %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
{% block tail_js %}{% endblock %}
</body>
</html>
