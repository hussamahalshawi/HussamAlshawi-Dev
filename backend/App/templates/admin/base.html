<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ admin_view.name }} | HussamDev Admin{% endblock %}</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root { --primary-color: #2563eb; --sidebar-bg: #1e293b; --main-bg: #f8fafc; }
        body { background-color: var(--main-bg); font-family: 'Inter', sans-serif; }
        .navbar-custom { background: #ffffff; border-bottom: 1px solid #e2e8f0; padding: 0.75rem 1.5rem; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; color: #0f172a !important; }
        .nav-link { color: #475569 !important; font-weight: 500; transition: 0.2s; }
        .nav-link:hover { color: var(--primary-color) !important; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom sticky-top shadow-sm">
    <a class="navbar-brand" href="/admin">
        <i class="fas fa-cube text-primary mr-2"></i> HussamDev <span class="badge badge-soft-primary ml-1">v3.0</span>
    </a>
    <div class="collapse navbar-collapse" id="adminNavbar">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="nav-link {% if admin_view.endpoint == 'mediavault' %}active text-primary{% endif %}"
                   href="{{ url_for('mediavault.index_view') }}">
                    <i class="fas fa-hdd mr-1"></i> Media Vault
                </a>
            </li>

            {% for item in admin_view.admin.menu() %}
            <li class="nav-item">
                <a class="nav-link" href="{{ item.get_url() }}">{{ item.name }}</a>
            </li>
            {% endfor %}
        </ul>
    </div>
</nav>

<main class="py-4">
    {% block body %}{% endblock %}
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
{% block tail_js %}{% endblock %}
</body>
</html>
