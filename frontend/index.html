<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ───────────────────────────────────────────────── -->
    <title>Hussam Alshawi — Portfolio Dashboard</title>
    <meta name="description" content="Full Stack Developer Portfolio — Skills, Projects, Experience & Analytics Dashboard." />
    <meta name="theme-color" content="#cfe0f5" />

    <!-- ── Font preconnect for performance ──────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      FONTS — Devoryn aesthetic:
        Syne           → Display / headings   (geometric, bold personality)
        DM Sans        → Body text            (clean, readable, modern)
        JetBrains Mono → Mono / code labels   (technical, precise feel)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Favicon ───────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!--
      NOTE: All styles are in CSS files imported via main.jsx.
      boot.css is the first import in main.jsx and handles
      the #boot-loader and body background to prevent FOUC.
    -->
  </head>

  <body>

    <!--
      BOOT LOADER — visible while React bundle downloads + hydrates.
      Styled entirely by src/styles/boot.css (imported first in main.jsx).
      Hidden by JS in main.jsx after React mounts via classList.add('hidden').
    -->
    <div id="boot-loader" role="status" aria-label="Loading portfolio">
      <div class="boot-ring"></div>
      <span class="boot-text">Loading Portfolio…</span>
      <span class="boot-logo">HA<em>.</em>Dev</span>
    </div>

    <!--
      ROOT — React mounts the entire application here.
      DashboardLayout renders sidebar + topbar + all sections.
    -->
    <div id="root"></div>

    <!--
      ENTRY POINT — Vite replaces this with the bundled ES module.
      main.jsx → App.jsx → Home.jsx → DashboardLayout + sections
    -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
