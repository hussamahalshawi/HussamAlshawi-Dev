<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ───────────────────────────────────────────────── -->
    <title>Hussam Alshawi — Portfolio Dashboard</title>
    <meta
      name="description"
      content="Full Stack Developer Portfolio — Skills, Projects, Experience and Analytics Dashboard."
    />
    <meta name="theme-color" content="#cfe0f5" />

    <!-- ── Font preconnect for performance ──────────────────── -->
    <!-- Preconnect tells the browser to open the connection early -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      FONTS — Three typefaces for the Devoryn aesthetic:
        Syne           → Display / headings   (geometric, bold personality)
        DM Sans        → Body text            (clean, readable, modern)
        JetBrains Mono → Mono / code labels   (technical, precise feel)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Favicon ───────────────────────────────────────────── -->
    <link rel="icon" id="dynamic-favicon" href="/favicon.svg" />

    <!--
      NOTE: All styles are imported via main.jsx (not here).
      boot.css is imported FIRST in main.jsx to prevent FOUC
      (Flash of Unstyled Content) before React hydrates.
    -->
  </head>

  <body>

    <!--
      BOOT LOADER
      ────────────────────────────────────────────────────────
      Visible while the React bundle downloads and hydrates.
      Styled by src/styles/boot.css (first import in main.jsx).
      Hidden by JS in main.jsx after React mounts.
    -->
    <div id="boot-loader" role="status" aria-label="Loading portfolio">
      <div class="boot-ring"></div>                  <!-- Spinning dual-color ring -->
      <span class="boot-text">Loading Portfolio…</span> <!-- Loading label -->
      <span class="boot-logo">HA<em>.</em>Dev</span>    <!-- Brand mark at bottom -->
    </div>

    <!--
      ROOT
      ────────────────────────────────────────────────────────
      React mounts the entire application here.
      DashboardLayout renders sidebar + topbar + all sections.
    -->
    <div id="root"></div>

    <!--
      ENTRY POINT
      ────────────────────────────────────────────────────────
      Vite replaces this with the bundled ES module at build time.
      Chain: main.jsx → App.jsx → Home.jsx → DashboardLayout + sections
    -->
    <script type="module" src="/src/main.jsx"></script>

  </body>
</html>
